<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="description" content="Личный дневник — твои мысли, всегда рядом" />
  <title>Мой Дневник</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- Background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="glass-card header">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <div>
          <h1 class="app-title">Мой Дневник</h1>
          <p class="app-subtitle" id="entries-count">Загрузка...</p>
        </div>
      </div>
      <div class="header-right">
        <button class="btn btn-primary" id="new-entry-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Новая запись</span>
        </button>
      </div>
    </header>

    <!-- Search bar -->
    <div class="search-bar glass-card">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Поиск по записям..." autocomplete="off" />
      <button class="btn-icon" id="clear-search" style="display:none;" title="Очистить">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Entries list -->
    <main class="entries-grid" id="entries-container">
      <!-- Entries rendered by JS -->
    </main>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <h2>Записей пока нет</h2>
      <p>Нажми «Новая запись», чтобы начать свой дневник</p>
      <button class="btn btn-primary" id="empty-new-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Написать первую запись
      </button>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal glass-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Новая запись</h2>
        <button class="btn-icon modal-close" id="modal-close" title="Закрыть">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="entry-title">Заголовок</label>
          <input type="text" id="entry-title" placeholder="О чём хочешь написать?" maxlength="120" />
        </div>
        <div class="form-group mood-group">
          <label>Настроение</label>
          <div class="mood-selector" id="mood-selector">
            <button class="mood-btn" data-mood="😊" title="Радость">😊</button>
            <button class="mood-btn" data-mood="😢" title="Грусть">😢</button>
            <button class="mood-btn" data-mood="😡" title="Злость">😡</button>
            <button class="mood-btn" data-mood="😴" title="Усталость">😴</button>
            <button class="mood-btn" data-mood="🤔" title="Раздумья">🤔</button>
            <button class="mood-btn" data-mood="🥰" title="Любовь">🥰</button>
            <button class="mood-btn" data-mood="😎" title="Уверенность">😎</button>
            <button class="mood-btn" data-mood="😰" title="Тревога">😰</button>
          </div>
        </div>
        <div class="form-group">
          <label for="entry-content">Текст записи</label>
          <textarea id="entry-content" placeholder="Напиши что-нибудь..." rows="10"></textarea>
        </div>
        <div class="char-counter"><span id="char-count">0</span> символов</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">Отмена</button>
        <button class="btn btn-danger" id="modal-delete" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
          Удалить
        </button>
        <button class="btn btn-primary" id="modal-save">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Confirm dialog -->
  <div class="modal-overlay" id="confirm-overlay" aria-hidden="true">
    <div class="modal confirm-modal glass-card" role="alertdialog">
      <div class="modal-body" style="text-align:center; padding: 2rem;">
        <div style="font-size:3rem; margin-bottom:1rem;">🗑️</div>
        <h3 style="margin-bottom:0.5rem; color: var(--text-primary);">Удалить запись?</h3>
        <p style="color: var(--text-secondary); margin-bottom:1.5rem;">Это действие нельзя отменить</p>
        <div style="display:flex; gap:1rem; justify-content:center;">
          <button class="btn btn-ghost" id="confirm-no">Нет</button>
          <button class="btn btn-danger" id="confirm-yes">Удалить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service_worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
